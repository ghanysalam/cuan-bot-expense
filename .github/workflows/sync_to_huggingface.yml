name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # URL diperbaiki (tanpa /tree/main)
          git push --force https://ghanysalam:$HF_TOKEN@huggingface.co/spaces/ghanysalam/cuan-bot-expense main